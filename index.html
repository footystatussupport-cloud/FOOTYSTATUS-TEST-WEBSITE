  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener("error", function (event) {
        window.setTimeout(function () {
          var root = document.getElementById("root");
          if (root && !root.innerHTML.trim()) {
            root.innerHTML =
              '<main style="max-width:680px;margin:40px auto;padding:24px;font-family:Arial,sans-serif;color:#111827">' +
              '<h1>Footy Status could not start</h1>' +
              '<p>Please refresh the page. If this message remains, send this error to Footy Status:</p>' +
              '<pre style="white-space:pre-wrap;background:#f3f4f6;padding:12px;border-radius:8px">' +
              String(event.message || "A site file failed to load.") +
              "</pre></main>";
          }
        }, 100);
      }, true);
    </script>  </body>
